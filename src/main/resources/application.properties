spring.application.name=shopping-mall-management-system

# Render Port
server.port=${PORT:9090}

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/shopping_mall_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=shardul@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Thymeleaf Configuration
spring.thymeleaf.cache=false

# Error Configuration
server.error.include-message=always